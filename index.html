<!DOCTYPE html>
<style>
    body {
        font-family: monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #141414;
        color: white;
    }
    header {
        text-align: center;
    }
    game {
        display: flex;
        flex-direction: row;
        gap: 50px;
    }
    #board {
        width: 400px;
        height: 800px;
        border: solid 1px white;
    }
    side {
        width: 150px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 20px;
        gap: 20px;
    }
    .top-bar {
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
    }
    .top-bar span {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
    }
    #ai_mode {
        height: 10px;
    }
    li {
        font-size: 12px;
        margin-bottom: 5px;
    }
    .ai-mode-ul {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }
</style>
<html>
    <body>
        <main>
            <div class="top-bar">
                <h3>Tetris Game</h3>
            </div>
            <header>
                <h1>Score: <span id="score">0</span> <span style="display: none;">(<span id="effeciency">0</span>%)</span></h1>
            </header>
            <game>
                <side id="held_container">
                    <label>Held</label>
                    <canvas id="held_canvas" width="160" height="160"></canvas>
                    <div>
                        <h5>Implemented:</h5>
                        <ul>
                            <li>Avoid holes</li>
                            <li>Avoid placing pieces too high</li>
                            <li>Minimize bumpy placement</li>
                            <li>Minimize empty pillars</li>
                            <li>Minimize clearing less than 4 lines</li>
                        </ul>
                    </div>
                </side>
                <canvas id="board" width="400" height="800"></canvas>
                <side id="next_contaner">
                    <label>Next</label>
                    <canvas id="next_canvas" width="160" height="160"></canvas>
                    <div>
                        <h5>AI Mode:</h5>
                        <ul class="ai-mode-ul">
                            <li>
                                <input type="radio" name="mode" id="3" onchange="best_path = null; ai_mode = parseInt(this.id); sessionStorage.setItem('ai_mode',this.id)" checked><label>Current and Hold</label>
                            </li>
                            <li>
                                <input type="radio" name="mode" id="2" onchange="best_path = null; ai_mode = parseInt(this.id); sessionStorage.setItem('ai_mode',this.id)"><label>Current then Hold</label>
                            </li>
                            <li>
                                <input type="radio" name="mode" id="1" onchange="best_path = null; ai_mode = parseInt(this.id); sessionStorage.setItem('ai_mode',this.id)"><label>Current or Hold</label>
                            </li>
                            <li>
                                <input type="radio" name="mode" id="0" onchange="best_path = null; ai_mode = parseInt(this.id); sessionStorage.setItem('ai_mode',this.id)"><label>Off</label>
                            </li>
                        </ul>
                    </div>
                </side>
            </game>
        </main>
    </body>
</html>
<script src="renderer.js"></script>
<script src="blocks.js"></script>
<script src="evaluation.js"></script>
<script src="AI.js"></script>
<script src="game.js"></script>
