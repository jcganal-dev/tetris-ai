<!DOCTYPE html>
<style>
    body {
        font-family: monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #141414;
        color: white;
    }
    main {
        display: flex;
        flex-direction: row;
        gap: 50px;
    }
    #board {
        width: 400px;
        height: 800px;
    }
    side {
        width: 150px;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 20px;
    }
</style>
<html>
    <body>
        <head>
            <h1>Score: <span id="score">0</span> <span style="display: none;">(<span id="effeciency">0</span>%)</span></h1>
        </head>
        <main>
            <side id="held_container">
                <label>Held</label>
                <canvas id="held_canvas" width="160" height="160"></canvas>
            </side>
            <canvas id="board" width="400" height="800"></canvas>
            <side id="next_contaner">
                <label>Next</label>
                <canvas id="next_canvas" width="160" height="160"></canvas>
            </side>
        </main>
    </body>
</html>
